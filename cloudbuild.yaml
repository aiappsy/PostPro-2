steps:
  # Create .env file for production
  - name: 'bash'
    args:
      - '-c'
      - |
        cat <<EOF > .env
        APP_NAME="PostPro"
        APP_ENV=190368361945
        APP_KEY=$_APP_KEY
        APP_DEBUG=false
        APP_URL=https://postpro.ai
        LOG_CHANNEL=stack
        LOG_LEVEL=error
        DB_CONNECTION=pgsql
        DB_HOST=$_DB_HOST
        DB_PORT=5432
        DB_DATABASE=postpro
        DB_USERNAME=postgres
        DB_PASSWORD=$_DB_PASSWORD
        BROADCAST_CONNECTION=log
        CACHE_STORE=database
        CACHE_PREFIX=postpro_cache
        QUEUE_CONNECTION=database
        SESSION_STORE=database
        SESSION_ENCLAVE=true
        SESSION_LIFETIME=120
        VITE_FIREBASE_API_KEY=AIzaSyBFQTncQu0DvvjUCw4tpehTAJa8sMiOxK8
        VITE_FIREBASE_PROJECT_ID=postpro-auth-777
        EOF

  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/postpro', '.']

  # Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/postpro']

  # Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'postpro'
      - '--image'
      - 'gcr.io/$PROJECT_ID/postpro'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/postpro'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _APP_KEY: 'KEEP_EXISTING'
  _DB_HOST: '127.0.0.1'
  _DB_PASSWORD: 'USE_CURRENT_SECRET'
